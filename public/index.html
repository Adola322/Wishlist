<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .header h1 { color: #667eea; }
        .main {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }
        .sidebar, .content {
            background: white;
            border-radius: 15px;
            padding: 20px;
        }
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: #f0f0f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .user-item:hover { background: #667eea; color: white; }
        .user-item.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .user-info {
            flex: 1;
            cursor: pointer;
        }
        .user-name { font-weight: bold; }
        .user-email { font-size: 11px; opacity: 0.8; }
        .delete-user {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .delete-user:hover {
            background: #c82333;
            transform: scale(1.05);
        }
        .wish-item {
            background: #f9f9f9;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .wish-item.completed { 
            opacity: 0.6;
            background: #e8e8e8;
            border-left-color: #28a745;
        }
        .wish-title.completed {
            text-decoration: line-through;
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        .btn-success { background: #28a745; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-danger { background: #dc3545; }
        input {
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 100%;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
        }
        h3 { margin-bottom: 15px; }
        .confirm-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .confirm-buttons button {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎁 Wishlist Система</h1>
            <p>Управляй своими желаниями</p>
        </div>
        <div class="main">
            <div class="sidebar">
                <h3>👥 Пользователи</h3>
                <div id="usersList"></div>
                <button class="btn" onclick="openUserModal()">+ Добавить пользователя</button>
            </div>
            <div class="content">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <h3 id="title">✨ Все желания</h3>
                    <button class="btn" onclick="openWishModal()">+ Новое желание</button>
                </div>
                <div id="wishesList"></div>
            </div>
        </div>
    </div>

    <!-- Модалка пользователя -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <h3>Новый пользователь</h3>
            <input type="text" id="userName" placeholder="Имя">
            <input type="email" id="userEmail" placeholder="Email">
            <button class="btn" onclick="addUser()">Сохранить</button>
            <button class="btn" onclick="closeUserModal()">Отмена</button>
        </div>
    </div>

    <!-- Модалка подтверждения удаления -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ Подтверждение удаления</h3>
            <p id="confirmMessage">Вы уверены, что хотите удалить пользователя?</p>
            <p style="color: #dc3545; font-size: 14px; margin-top: 10px;">ВНИМАНИЕ! Все желания пользователя также будут удалены!</p>
            <div class="confirm-buttons">
                <button class="btn btn-danger" id="confirmDeleteBtn">Удалить</button>
                <button class="btn" onclick="closeConfirmModal()">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модалка желания -->
    <div id="wishModal" class="modal">
        <div class="modal-content">
            <h3 id="wishModalTitle">Новое желание</h3>
            <input type="hidden" id="wishId">
            <input type="text" id="wishTitle" placeholder="Название">
            <input type="number" id="wishPrice" placeholder="Цена">
            <button class="btn" id="saveWishBtn">Сохранить</button>
            <button class="btn" onclick="closeWishModal()">Отмена</button>
            <button class="btn btn-danger" id="deleteWishBtn" style="display:none">Удалить</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let users = [];
        let wishes = [];
        let userToDelete = null;

        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                users = await res.json();
                const container = document.getElementById('usersList');
                if (!container) return;
                container.innerHTML = users.map(user => `
                    <div class="user-item">
                        <div class="user-info" onclick="selectUser(${user.id})">
                            <div class="user-name">${user.name}</div>
                            <div class="user-email">${user.email}</div>
                        </div>
                        <button class="delete-user" onclick="confirmDeleteUser(${user.id}, '${user.name}')">🗑 Удалить</button>
                    </div>
                `).join('');
            } catch(e) {
                console.error('Ошибка загрузки пользователей:', e);
            }
        }

        async function selectUser(id) {
            currentUser = users.find(u => u.id === id);
            const title = document.getElementById('title');
            if (title) title.innerHTML = `✨ Желания ${currentUser.name}`;
            await loadWishes();
            loadUsers();
        }

        async function loadWishes() {
            try {
                let url = '/api/wishes';
                if (currentUser) url += '?userId=' + currentUser.id;
                const res = await fetch(url);
                wishes = await res.json();
                const container = document.getElementById('wishesList');
                if (!container) return;
                if (wishes.length === 0) {
                    container.innerHTML = '<p>Нет желаний</p>';
                    return;
                }
                container.innerHTML = wishes.map(wish => `
                    <div class="wish-item ${wish.status === 'completed' ? 'completed' : ''}">
                        <div>
                            <strong class="${wish.status === 'completed' ? 'completed' : ''}">${wish.title}</strong><br>
                            <span>${wish.price?.toLocaleString()} ₽</span>
                        </div>
                        <div>
                            ${wish.status === 'completed' ? 
                                `<button class="btn btn-warning" onclick="undoComplete(${wish.id})">🔄 Отменить</button>` : 
                                `<button class="btn btn-success" onclick="completeWish(${wish.id})">✅ Выполнить</button>`
                            }
                            <button class="btn" onclick="editWish(${wish.id})">✏️ Редактировать</button>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                console.error('Ошибка загрузки желаний:', e);
            }
        }

        async function completeWish(id) {
            await fetch(`/api/wishes/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'completed' })
            });
            await loadWishes();
        }

        async function undoComplete(id) {
            await fetch(`/api/wishes/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'active' })
            });
            await loadWishes();
        }

        // Подтверждение удаления пользователя
        function confirmDeleteUser(id, name) {
            userToDelete = id;
            const confirmModal = document.getElementById('confirmModal');
            const confirmMessage = document.getElementById('confirmMessage');
            confirmMessage.innerHTML = `Вы уверены, что хотите удалить пользователя <strong>${name}</strong>?`;
            if (confirmModal) confirmModal.style.display = 'flex';
        }

        function closeConfirmModal() {
            const confirmModal = document.getElementById('confirmModal');
            if (confirmModal) confirmModal.style.display = 'none';
            userToDelete = null;
        }

        // Удаление пользователя
        async function deleteUser() {
            if (!userToDelete) return;
            
            try {
                const res = await fetch(`/api/users/${userToDelete}`, {
                    method: 'DELETE'
                });
                
                if (res.ok) {
                    // Если удалили текущего пользователя - сбрасываем выбор
                    if (currentUser && currentUser.id === userToDelete) {
                        currentUser = null;
                        document.getElementById('title').innerHTML = '✨ Все желания';
                    }
                    
                    closeConfirmModal();
                    await loadUsers();
                    await loadWishes();
                    alert('Пользователь удален!');
                } else {
                    alert('Ошибка при удалении');
                }
            } catch(e) {
                console.error('Ошибка удаления:', e);
                alert('Ошибка при удалении');
            }
        }

        function openUserModal() {
            const modal = document.getElementById('userModal');
            if (modal) modal.style.display = 'flex';
        }
        
        function closeUserModal() {
            const modal = document.getElementById('userModal');
            if (modal) modal.style.display = 'none';
            document.getElementById('userName').value = '';
            document.getElementById('userEmail').value = '';
        }

        async function addUser() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            
            if (!name || !email) {
                alert('Заполните имя и email!');
                return;
            }
            
            try {
                const res = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email })
                });
                
                const newUser = await res.json();
                console.log('Добавлен пользователь:', newUser);
                
                closeUserModal();
                await loadUsers();
                
                alert('Пользователь добавлен!');
            } catch(e) {
                console.error('Ошибка добавления:', e);
                alert('Ошибка при добавлении');
            }
        }

        function openWishModal() {
            if (!currentUser) {
                alert('Сначала выберите пользователя!');
                return;
            }
            document.getElementById('wishModalTitle').innerHTML = 'Новое желание';
            document.getElementById('wishId').value = '';
            document.getElementById('wishTitle').value = '';
            document.getElementById('wishPrice').value = '';
            document.getElementById('deleteWishBtn').style.display = 'none';
            document.getElementById('wishModal').style.display = 'flex';
        }
        
        function closeWishModal() {
            document.getElementById('wishModal').style.display = 'none';
        }

        async function editWish(id) {
            const wish = wishes.find(w => w.id === id);
            document.getElementById('wishModalTitle').innerHTML = 'Редактировать желание';
            document.getElementById('wishId').value = wish.id;
            document.getElementById('wishTitle').value = wish.title;
            document.getElementById('wishPrice').value = wish.price;
            document.getElementById('deleteWishBtn').style.display = 'block';
            document.getElementById('wishModal').style.display = 'flex';
        }

        document.getElementById('saveWishBtn').onclick = async () => {
            const id = document.getElementById('wishId').value;
            const title = document.getElementById('wishTitle').value;
            const price = document.getElementById('wishPrice').value;
            
            if (!title) {
                alert('Введите название');
                return;
            }
            
            if (id) {
                await fetch(`/api/wishes/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, price })
                });
            } else {
                await fetch('/api/wishes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUser.id, title, price })
                });
            }
            closeWishModal();
            await loadWishes();
        };

        document.getElementById('deleteWishBtn').onclick = async () => {
            const id = document.getElementById('wishId').value;
            if (!confirm('Удалить желание?')) return;
            await fetch(`/api/wishes/${id}`, { method: 'DELETE' });
            closeWishModal();
            await loadWishes();
        };

        // Кнопка подтверждения удаления
        document.getElementById('confirmDeleteBtn').onclick = () => {
            deleteUser();
        };

        loadUsers();
        loadWishes();
    </script>
</body>
</html>
